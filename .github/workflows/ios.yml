name: LeitnerBox UnitTest

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test Unit Tests
    runs-on: macos-15
    env:
      IS_CONTINUOUS_INTEGRATION: 1
    steps:
    - uses: actions/checkout@v5
    - name: Show Xcode Version
      run: /usr/bin/xcodebuild -version
    - name: Select Available Simulator
      shell: bash
      run: |
        set -euo pipefail
        SIMULATOR_NAME="$(xcrun simctl list devices available iOS | grep -Eo 'iPhone[^()]+' | head -n 1 | xargs)"
        if [[ -z "${SIMULATOR_NAME}" ]]; then
          echo "No available iOS simulator found on the runner."
          xcrun simctl list devices available
          exit 1
        fi

        echo "Using simulator: ${SIMULATOR_NAME}"
        echo "SIMULATOR_NAME=${SIMULATOR_NAME}" >> "${GITHUB_ENV}"
    - name: Run Unit Tests
      shell: bash
      run: |
        set -euo pipefail
        xcodebuild clean \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS="" \
          CODE_SIGNING_REQUIRED="NO" \
          CODE_SIGNING_ALLOWED="NO" \
          test \
          -project LeitnerBox.xcodeproj \
          -scheme LeitnerBox \
          -sdk iphonesimulator \
          -destination "platform=iOS Simulator,name=${SIMULATOR_NAME}" \
          -only-testing:LeitnerBoxTests \
          IS_CONTINUOUS_INTEGRATION="${IS_CONTINUOUS_INTEGRATION}"
